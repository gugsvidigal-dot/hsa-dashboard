<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSA · Dashboard Gerencial</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js
"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap
" rel="stylesheet">
<style>
:root {
  --bg:      #0F1117;
  --surf:    #171B26;
  --surf2:   #1E2333;
  --border:  rgba(255,255,255,0.07);
  --text:    #E8EAF0;
  --muted:   #6B7280;
  --accent:  #E07B47;
  --accent2: #F0B429;
  --green:   #34C77B;
  --red:     #F05252;
  --blue:    #5B8DEF;
  --purple:  #A78BFA;
  --opex:    #E07B47;
  --capex:   #F0B429;
  --finex:   #5B8DEF;
  --plr:     #A78BFA;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;
  background-image:radial-gradient(ellipse 60% 40% at 80% 0%,rgba(224,123,71,.08) 0%,transparent 60%),
                   radial-gradient(ellipse 40% 30% at 10% 100%,rgba(91,141,239,.06) 0%,transparent 50%);}

header{display:flex;flex-direction:column;align-items:stretch;
  padding:14px 40px 0;border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;background:rgba(15,17,23,.9);backdrop-filter:blur(16px);}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:12px;padding-bottom:12px;}
.brand{display:flex;align-items:center;gap:12px;flex-shrink:0;}
.brand-mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:18px;}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;}
.brand-sub{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:1px;}
.header-controls{display:flex;align-items:center;gap:12px;min-width:0;}
.header-nav{padding:8px 0;border-top:1px solid var(--border);}
.header-nav .ptabs{border-radius:0;background:none;padding:0;gap:4px;flex-wrap:wrap;}
.header-nav .ptab{flex:1;text-align:center;min-width:fit-content;background:var(--surf2);border-radius:6px;}

.ptabs{display:flex;gap:3px;background:var(--surf2);border-radius:8px;padding:3px;align-items:center;
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap;}
.ptabs::-webkit-scrollbar{display:none;}
.ptab{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--muted);transition:.2s;white-space:nowrap;flex-shrink:0;}
.ptab.on{background:var(--accent);color:#fff;}
.pdrop{position:relative;display:inline-flex;}
.pdrop-btn{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--muted);transition:.2s;display:flex;align-items:center;gap:5px;}
.pdrop-btn.on{background:var(--accent);color:#fff;}
.pdrop-btn::after{content:'▾';font-size:10px;opacity:.7;}
.pdrop-menu{display:none;position:absolute;top:calc(100% + 4px);left:0;background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:4px;min-width:140px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.3);}
.pdrop.open .pdrop-menu{display:flex;flex-direction:column;gap:2px;}
.pdrop-item{padding:6px 12px;border-radius:5px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--muted);text-align:left;transition:.15s;white-space:nowrap;}
.pdrop-item:hover{background:rgba(255,255,255,.06);color:var(--text);}
.pdrop-item.on{background:var(--accent);color:#fff;}

.type-filter{display:flex;align-items:center;gap:6px;}
.type-filter .flabel{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-right:2px;}
.tchk{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;cursor:pointer;
  border:1px solid var(--border);background:var(--surf2);font-size:12px;font-weight:500;
  color:var(--muted);transition:all .2s;user-select:none;}
.tchk input{display:none;}
.tchk.active-opex {border-color:var(--opex);background:rgba(224,123,71,.15);color:var(--opex);}
.tchk.active-capex{border-color:var(--capex);background:rgba(240,180,41,.15);color:var(--capex);}
.tchk.active-finex{border-color:var(--finex);background:rgba(91,141,239,.15);color:var(--finex);}
.tchk.active-plr  {border-color:var(--plr);background:rgba(167,139,250,.15);color:var(--plr);}

main{padding:28px 40px;max-width:1440px;margin:0 auto;min-width:0;}
.nota{display:flex;align-items:center;gap:8px;background:rgba(91,141,239,.08);border:1px solid rgba(91,141,239,.2);
  border-radius:8px;padding:10px 16px;margin-bottom:22px;font-size:12px;color:#9BBAF5;}

.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:26px;}
.kpi{background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:20px;
  position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;animation:fadeUp .5s ease both;}
.kpi:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.4);}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;border-radius:0 0 14px 14px;}
.kpi.ka::after{background:linear-gradient(90deg,var(--accent),var(--accent2));}
.kpi.kb::after{background:linear-gradient(90deg,var(--red),#FF6B6B);}
.kpi.kc::after{background:linear-gradient(90deg,var(--blue),var(--purple));}
.kpi.kd::after{background:linear-gradient(90deg,var(--green),#7EDDB8);}
.kpi.ke::after{background:linear-gradient(90deg,var(--accent2),#E5C46A);}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px;}
.kpi-val{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;line-height:1;margin-bottom:10px;}
.kpi-val small{font-size:14px;font-weight:400;}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;}
.tag.up  {background:rgba(52,199,123,.12);color:var(--green);}
.tag.down{background:rgba(240,82,82,.12); color:var(--red);}
.tag.neu {background:rgba(107,114,128,.15);color:var(--muted);}
.kpi-note{font-size:11px;color:var(--muted);margin-top:6px;}

.sec-head{display:flex;align-items:center;gap:10px;font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;
  color:var(--text);margin-bottom:16px;}
.sec-head::after{content:'';flex:1;height:1px;background:var(--border);}

.row{display:grid;gap:14px;margin-bottom:26px;}
.c73{grid-template-columns:7fr 3fr;}
.c64{grid-template-columns:6fr 4fr;}
.c2 {grid-template-columns:1fr 1fr;}

.card{background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:22px;animation:fadeUp .6s ease both;}
.card-title{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:18px;
  display:flex;align-items:center;justify-content:space-between;}
.card-title span{font-size:12px;color:var(--text);text-transform:none;letter-spacing:0;font-weight:600;}
.chart-wrap{position:relative;}

.bar-list{display:flex;flex-direction:column;gap:9px;}
.bar-top{display:flex;justify-content:space-between;margin-bottom:3px;}
.bar-name{font-size:12px;color:var(--text);}
.bar-amt{font-size:12px;font-weight:600;}
.bar-pct{font-size:10px;color:var(--muted);}
.bar-track{height:5px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.16,1,.3,1);}

.donut-wrap{display:flex;flex-direction:column;gap:14px;margin-top:6px;}
.donut-legend{display:flex;flex-direction:column;gap:8px;}
.leg-item{display:flex;align-items:center;gap:8px;font-size:12px;}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.leg-name{flex:1;color:var(--text);}
.leg-pct{color:var(--muted);font-size:11px;}
.leg-val{font-weight:600;font-size:12px;}

.ig{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:26px;}
.insight{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:16px 18px;
  display:flex;gap:12px;align-items:flex-start;}
.ins-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.ins-icon.warn {background:rgba(240,180,41,.12);}
.ins-icon.good {background:rgba(52,199,123,.12);}
.ins-icon.info {background:rgba(91,141,239,.12);}
.ins-icon.alert{background:rgba(240,82,82,.12);}
.ins-body h4{font-size:13px;font-weight:600;margin-bottom:4px;}
.ins-body p{font-size:12px;color:var(--muted);line-height:1.5;}

.ctbl{width:100%;border-collapse:collapse;}
.ctbl th{font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);
  text-align:left;padding:0 0 10px;border-bottom:1px solid var(--border);}
.ctbl td{padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:13px;}
.ctbl td:not(:first-child){text-align:right;}
.ctbl tr:last-child td{border-bottom:none;}
.vup  {color:var(--red);  font-weight:600;font-size:12px;}
.vdown{color:var(--green);font-weight:600;font-size:12px;}
.vneu {color:var(--muted);font-size:12px;}
.tbadge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;margin-left:4px;font-weight:600;}

  padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}

/* Badge real vs projetado */
.real-badge{display:inline-block;font-size:9px;padding:1px 6px;border-radius:4px;font-weight:600;
  background:rgba(52,199,123,.15);color:var(--green);margin-left:6px;vertical-align:middle;}
.proj-badge{display:inline-block;font-size:9px;padding:1px 6px;border-radius:4px;font-weight:600;
  background:rgba(107,114,128,.15);color:var(--muted);margin-left:6px;vertical-align:middle;}

/* ── DRILL-DOWN PANEL ── */
.drill-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.55);backdrop-filter:blur(6px);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.drill-overlay.open{opacity:1;pointer-events:all;}
.drill-panel{
  width:100%;max-width:1100px;
  background:var(--surf);
  border:1px solid var(--border);
  border-bottom:none;
  border-radius:20px 20px 0 0;
  padding:28px 36px 36px;
  transform:translateY(40px);
  transition:transform .3s cubic-bezier(.16,1,.3,1);
  max-height:82vh;overflow-y:auto;
}
.drill-overlay.open .drill-panel{transform:translateY(0);}
.drill-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.drill-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;}
.drill-title small{font-size:14px;font-weight:400;color:var(--muted);margin-left:8px;}
.drill-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);
  background:var(--surf2);color:var(--muted);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.2s;}
.drill-close:hover{background:var(--border);color:var(--text);}
.drill-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px;}
.drill-kpi{background:var(--surf2);border:1px solid var(--border);border-radius:12px;padding:16px;}
.drill-kpi .dk-label{font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:6px;}
.drill-kpi .dk-val{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;}
.drill-kpi .dk-cmp{font-size:11px;margin-top:4px;}
.drill-body{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.drill-section h4{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px;}
.hint-click{font-size:11px;color:var(--muted);margin-top:6px;display:flex;align-items:center;gap:5px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.kpi:nth-child(1){animation-delay:.04s}.kpi:nth-child(2){animation-delay:.08s}
.kpi:nth-child(3){animation-delay:.12s}.kpi:nth-child(4){animation-delay:.16s}
.kpi:nth-child(5){animation-delay:.20s}
.hidden{display:none!important;}

/* ═══════════════════════════════════════════════════
   RESPONSIVO — Tablet (≤900px) · Mobile (≤600px) · Mini (≤380px)
   ═══════════════════════════════════════════════════ */

/* ── Header: abas com scroll horizontal em todos os tamanhos ── */
header {
  flex-wrap: wrap;
  gap: 10px;
}
.header-controls {
  min-width: 0;
  flex: 1;
}
.ptabs {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  flex-wrap: nowrap;
  min-width: 0;
}
.ptabs::-webkit-scrollbar { display: none; }

/* ── Tablet (≤900px) ── */
@media (max-width: 900px) {
  header { padding: 12px 20px 0; }
  .brand-sub  { display: none; }
  .brand-name { font-size: 18px; }
  main { padding: 18px 20px; }

  .kpi-row { grid-template-columns: repeat(3,1fr); gap: 10px; }
  .c73, .c64 { grid-template-columns: 1fr; }
  .ig  { grid-template-columns: 1fr 1fr; }

  /* Drill */
  .drill-panel { max-height: 95vh; }
  .drill-grid  { grid-template-columns: 1fr 1fr; }

  /* Concorrentes: tabela com scroll */
  #view-concorrentes .card { overflow-x: auto; }
  #c-kpi-row { grid-template-columns: repeat(3,1fr) !important; }
}

/* ── Mobile (≤600px) ── */
@media (max-width: 600px) {
  header { padding: 10px 12px 0; gap: 0; }
  .header-top { padding-bottom: 8px; }
  .brand-mark { width: 30px; height: 30px; font-size: 14px; }
  .brand-name { font-size: 15px; }
  .header-nav { padding: 6px 0 8px; }
  .ptab { padding: 5px 8px; font-size: 11px; }
  .view-filter-bar { gap: 6px; margin-bottom: 12px; }
  .view-filter-label { font-size: 10px; }
  .gas-type-filter { flex-wrap: wrap; gap: 4px; }
  .tchk { padding: 4px 8px; font-size: 11px; }

  main { padding: 12px; }
  .nota { font-size: 11px; padding: 8px 12px; flex-wrap: wrap; gap: 6px; }

  /* KPIs 2 colunas */
  .kpi-row { grid-template-columns: 1fr 1fr !important; gap: 8px; margin-bottom: 14px; }
  .kpi { padding: 12px; border-radius: 10px; }
  .kpi-val { font-size: 20px; }
  .kpi-val small { font-size: 11px; }
  .kpi-label { font-size: 9px; margin-bottom: 5px; }
  .kpi-note { font-size: 10px; }

  /* Cards */
  .card { padding: 12px; border-radius: 10px; }
  .card-title { font-size: 10px; margin-bottom: 10px; flex-wrap: wrap; gap: 4px; }

  /* Grids coluna única */
  .row, .c2, .c73, .c64 { grid-template-columns: 1fr !important; }

  /* Gráficos */
  .chart-wrap { height: 190px !important; }

  /* Sec-head */
  .sec-head { font-size: 15px; margin-bottom: 10px; }

  /* Insights */
  .ig { grid-template-columns: 1fr !important; gap: 8px; }
  .insight { padding: 11px 12px; gap: 10px; }
  .ins-icon { width: 30px; height: 30px; font-size: 13px; flex-shrink: 0; }
  .ins-body h4 { font-size: 12px; }
  .ins-body p  { font-size: 11px; }

  /* Tabelas */
  .ctbl { font-size: 11px; }
  .ctbl th, .ctbl td { padding: 5px 6px; white-space: nowrap; }
  .card:has(.ctbl) { overflow-x: auto; }

  /* Donut */
  .donut-wrap { flex-direction: column; align-items: center; gap: 10px; }
  canvas[id^="c_d"] { max-width: 130px !important; }

  /* Bar list */
  .bar-name { font-size: 11px; }
  .bar-amt  { font-size: 11px; }
  .hint-click { font-size: 10px; }

  /* Drill-down */
  .drill-panel  { border-radius: 14px 14px 0 0; padding: 18px 14px 24px; }
  .drill-grid   { grid-template-columns: 1fr 1fr; gap: 8px; }
  .drill-body   { grid-template-columns: 1fr; gap: 10px; }
  .drill-title  { font-size: 18px; }
  .dk-val       { font-size: 18px; }
  .dk-label     { font-size: 9px; }
  .drill-close  { width: 28px; height: 28px; font-size: 15px; }

  /* Ptabs internos */
  #view-vendas .ptabs,
  #view-resultado .ptabs,
  #view-chales .ptabs,
  #view-canais .ptabs,
  #view-concorrentes .ptabs { flex-wrap: wrap; }

  /* Scroll horizontal em views com tabela */
  #view-resultado .card,
  #view-canais .card,
  #view-concorrentes .card { overflow-x: auto; }

  /* KPIs específicos de views — forçar 2 colunas */
  #kpi-row-canais,
  #kpi-row-chales,
  #kpi-row-aportes { grid-template-columns: 1fr 1fr !important; }

  /* Concorrentes: legenda inline já se adapta pelo view-filter-bar */

  /* Resultado: kpi-row 6 cols → 2 cols */
  #view-resultado .kpi-row { grid-template-columns: 1fr 1fr !important; }

  /* Vendas: dois kpi-rows → 2 cols */
  #v-kpis .kpi-row { grid-template-columns: 1fr 1fr !important; }

  /* Canais: garantir 1 col nos cards comparativos */
  #view-canais .row { grid-template-columns: 1fr !important; }

  /* Bar chart de concorrentes: labels menores */
  #c-bar-chart { font-size: 10px; }
  #c-bar-chart > div > div:first-child { min-width: 80px !important; font-size: 10px !important; }
  #c-bar-chart > div > div:nth-child(3) { min-width: 55px !important; font-size: 10px !important; }

  /* Tabelas com scroll horizontal */
  .card:has(table) { overflow-x: auto; }
  .ctbl { min-width: 480px; }

  footer { padding: 12px; font-size: 10px; }
}

/* ── Mini (≤380px) ── */
@media (max-width: 380px) {
  .kpi-row { grid-template-columns: 1fr !important; }
  #c-kpi-row { grid-template-columns: 1fr !important; }
  .ptab { padding: 4px 8px; font-size: 10px; }
  main  { padding: 8px; }
  .kpi-val { font-size: 22px; }
  .chart-wrap { height: 170px !important; }
  .drill-grid { grid-template-columns: 1fr; }
}
/* Evitar overflow horizontal global sem bloquear scroll de filhos */
html { overflow-x: hidden; }

/* Barra de filtros interna de cada view */
.view-filter-bar{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;width:100%;}
.view-filter-bar .ptabs{width:100%;flex-wrap:wrap;}
.view-filter-bar .ptab{flex:1;text-align:center;}
.view-filter-bar .gas-type-filter{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.view-filter-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}

/* Footer base */
footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
  padding:16px 40px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="brand">
      <div class="brand-mark">🏡</div>
      <div>
        <div class="brand-name">HSA · Pousada</div>
        <div class="brand-sub">Dashboard Gerencial</div>
      </div>
    </div>
  </div>
  <div class="header-nav">
    <div class="ptabs">
      <button class="ptab"    id="ptab-resultado"    onclick="goView('resultado',this)">📈 Resultado</button>
      <button class="ptab"    id="ptab-vendas"       onclick="goView('vendas',this)">📊 Vendas</button>
      <button class="ptab"    id="ptab-gastos"       onclick="goView('gastos',this)">💰 Gastos</button>
      <button class="ptab"    id="ptab-chales"       onclick="goView('chales',this)">🏡 Chalés</button>
      <button class="ptab"    id="ptab-canais"       onclick="goView('canais',this)">📡 Canais</button>
      <button class="ptab"    id="ptab-concorrentes" onclick="goView('concorrentes',this)">🔍 Concorrentes</button>
      <button class="ptab"    id="ptab-aportes"      onclick="goView('aportes',this)">💰 Aportes</button>
      <button class="ptab"    id="ptab-reserva"      onclick="goView('reserva',this)" style="background:linear-gradient(135deg,rgba(224,123,71,.25),rgba(240,180,41,.15));color:var(--accent);border:1px solid rgba(224,123,71,.3)">➕ Reserva</button>
    </div>
  </div>
