<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSA · Conectando Dropbox...</title>
<style>
  body { background:#0F1117; color:#E8EAF0; font-family:sans-serif;
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; margin:0; text-align:center; padding:20px; }
  .box { max-width:320px; }
  .icon { font-size:48px; margin-bottom:16px; }
  .msg { font-size:15px; color:#E8EAF0; margin-bottom:8px; font-weight:600; }
  .sub { font-size:12px; color:#6B7280; margin-bottom:24px; }
  .btn { display:block; padding:14px 28px; background:linear-gradient(135deg,#E07B47,#F0B429);
    color:#fff; font-weight:600; font-size:14px; border-radius:10px;
    text-decoration:none; cursor:pointer; border:none; width:100%;
    margin-top:8px; }
</style>
</head>
<body>
<div class="box">
  <div class="icon" id="icon">⟳</div>
  <div class="msg" id="msg">Conectando ao Dropbox...</div>
  <div class="sub" id="sub">Aguarde</div>
  <button class="btn" id="btn" style="display:none" onclick="window.location.href='https://gugsvidigal-dot.github.io/hsa-dashboard/'">
    Abrir Dashboard →
  </button>
</div>
<script>
  var DASHBOARD = 'https://gugsvidigal-dot.github.io/hsa-dashboard/';

  // Parsear hash
  var hash = (window.location.hash || '').replace('#', '');
  var params = {};
  hash.split('&').forEach(function(p) {
    var idx = p.indexOf('=');
    if (idx > 0) params[p.slice(0,idx)] = decodeURIComponent(p.slice(idx+1));
  });

  var token = params['access_token'];

  if (token) {
    try { localStorage.setItem('hsa_dbx_token', token); } catch(e) {}
    document.getElementById('icon').textContent = '✅';
    document.getElementById('msg').textContent = 'Dropbox conectado!';
    document.getElementById('sub').textContent = 'Abrindo dashboard...';
    document.getElementById('btn').style.display = 'block';
    // Redirecionar sem parâmetros
    setTimeout(function() {
      window.location.href = DASHBOARD;
    }, 1200);
  } else {
    document.getElementById('icon').textContent = '❌';
    document.getElementById('msg').textContent = 'Erro ao conectar';
    document.getElementById('sub').textContent = 'Token não encontrado.';
    document.getElementById('btn').textContent = '← Voltar';
    document.getElementById('btn').style.display = 'block';
  }
</script>
</body>
</html>
